<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <title>Приклад сторінки</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: green;
            padding: 20px;
            color: white;
            text-align: center;
        }
        /* Батьківський контейнер для всієї сторінки */
        main {
            display: flex;
            flex-direction: column;
            height: calc(100% - 60px); /* висота шапки приблизно 60px, можна підлаштувати */
        }
        .categories {
            padding: 20px;
            display: flex;
            gap: 15px;
        }
        iframe {
            flex: 1; /* щоб займав весь залишковий простір */
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Зелена шапка</h1>
    </header>
    <main>
        <div class="categories">
            <div class="category">тест 1</div>
            <div class="category">тест 2</div>
            <div class="category">тест 3</div>
            <div class="category">тест 4</div>
        </div>
        <iframe src="https://mines.kingfortuna.gold/index.htm"></iframe>
    </main>
</body>
</html>
